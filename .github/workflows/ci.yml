name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci
  NARGO_VERSION: 1.0.0-beta.19
  BB_VERSION: 4.0.0-nightly.20260120

jobs:
  solidity:
    name: Solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Build contracts
        run: |
          forge build --sizes 2>&1 | tee /tmp/sizes.txt || true
          # Check our contracts stay under 24KB (generated UltraHonk verifiers excluded --
          # they are ~24.6KB by design and deploy with linked libraries)
          if grep -E '^\|' /tmp/sizes.txt \
            | grep -v 'AttestationVerifier\|ComplianceVerifier\|MembershipVerifier\|NonMembershipVerifier\|PatternVerifier\|RiskScoreVerifier' \
            | grep -v 'CommitmentSchemeLib\|FrLib\|TranscriptLib\|EcLib\|UltraLib\|RelationsLib' \
            | awk -F'|' '{gsub(/[ ,]/,"",$4); if ($4+0 < 0) { print "OVER LIMIT: "$0; found=1}} END {exit (found ? 0 : 1)}'; then
            echo "::error::Contract exceeds 24KB size limit"
            exit 1
          fi
          echo "All non-generated contracts within 24KB limit"

      - name: Run tests
        run: forge test -vvv

      - name: Check gas snapshot
        run: FOUNDRY_PROFILE=default forge snapshot --check --tolerance 2

  circuits:
    name: Noir Circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache nargo
        uses: actions/cache@v4
        with:
          path: ~/.nargo
          key: nargo-${{ env.NARGO_VERSION }}

      - name: Install nargo
        run: |
          mkdir -p "$HOME/.nargo/bin"
          curl -L "https://github.com/noir-lang/noir/releases/download/v${{ env.NARGO_VERSION }}/nargo-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$HOME/.nargo/bin"
          export PATH="$HOME/.nargo/bin:$PATH"
          nargo --version

      - name: Run circuit tests
        run: |
          export PATH="$HOME/.nargo/bin:$PATH"
          cd circuits && nargo test --workspace

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    needs: [solidity, circuits]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install nargo
        run: |
          mkdir -p "$HOME/.nargo/bin"
          curl -L "https://github.com/noir-lang/noir/releases/download/v${{ env.NARGO_VERSION }}/nargo-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$HOME/.nargo/bin"
          export PATH="$HOME/.nargo/bin:$PATH"
          nargo --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile circuits
        run: |
          export PATH="$HOME/.nargo/bin:$PATH"
          for circuit in compliance risk_score pattern attestation membership non_membership; do
            echo "==> Compiling $circuit"
            cd "$GITHUB_WORKSPACE/circuits/$circuit" && nargo compile
          done
          ls circuits/compliance/target/compliance.json

      - name: Build contracts
        run: forge build

      - name: Run SDK tests
        run: npm run test:sdk
